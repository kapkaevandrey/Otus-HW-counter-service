services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030"
      KAFKA_BROKERS: kafka:9093
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    env_file:
      - dev.env
    command: ["api", "8000"]
    depends_on:
      valkey:
        condition: service_started
      kafka:
        condition: service_started

  app-instance:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030"
      KAFKA_BROKERS: kafka:9093
      REDIS_HOST: redis
      CHAT_SERVICE_URL: http://host.docker.internal:8001
    env_file:
      - dev.env
    command: [ "api", "8000" ]
    depends_on:
      - app

  valkey:
    image: dhi.io/valkey:9
    container_name: redis
    ports:
      - "6379:6379"
    command: ["valkey-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]

  kafka:
    image: dhi.io/kafka:4.1-native
    container_name: kafka
    ports:
      - "9092:9092"
    expose:
      - "9093"
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 50
    volumes:
      - kafka_data:/var/lib/kafka/data
      - /var/run/docker.sock:/var/run/docker.sock

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

volumes:
  kafka_data:

